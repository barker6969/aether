name: Build Aether for Windows

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-cli:
    name: Build CLI for Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            architecture: x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: aether-cli/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI Release
        run: |
          cd aether-cli
          cargo build --release --target ${{ matrix.target }}

      - name: Verify CLI Binary
        run: |
          ls -lh aether-cli/target/${{ matrix.target }}/release/aether-cli.exe
          aether-cli/target/${{ matrix.target }}/release/aether-cli.exe --version

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v3
        with:
          name: aether-cli-windows-${{ matrix.architecture }}
          path: aether-cli/target/${{ matrix.target }}/release/aether-cli.exe
          retention-days: 30

  build-desktop:
    name: Build Desktop for Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        bundle:
          - msi
          - nsis
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Yarn
        run: npm install --global yarn

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: aether-desktop/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('aether-desktop/yarn.lock') }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: aether-desktop/src-tauri/target
          key: ${{ runner.os }}-tauri-build-target-${{ hashFiles('aether-desktop/src-tauri/Cargo.lock') }}

      - name: Install Dependencies
        run: |
          cd aether-desktop
          yarn install --frozen-lockfile

      - name: Build Desktop (${{ matrix.bundle }})
        run: |
          cd aether-desktop
          yarn build:${{ matrix.bundle }}

      - name: List Bundle Output
        run: |
          Get-ChildItem -Recurse aether-desktop/src-tauri/target/release/bundle | Where-Object { $_.Extension -in '.msi', '.exe' }

      - name: Upload Desktop Artifact (${{ matrix.bundle }})
        uses: actions/upload-artifact@v3
        with:
          name: aether-desktop-windows-${{ matrix.bundle }}
          path: |
            aether-desktop/src-tauri/target/release/bundle/msi/*.msi
            aether-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-desktop-portable:
    name: Build Desktop Portable EXE
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Yarn
        run: npm install --global yarn

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: aether-desktop/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('aether-desktop/yarn.lock') }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: aether-desktop/src-tauri/target
          key: ${{ runner.os }}-tauri-build-target-portable-${{ hashFiles('aether-desktop/src-tauri/Cargo.lock') }}

      - name: Install Dependencies
        run: |
          cd aether-desktop
          yarn install --frozen-lockfile

      - name: Build Desktop (Portable)
        run: |
          cd aether-desktop
          yarn build

      - name: Verify Portable Binary
        run: |
          ls -lh aether-desktop/src-tauri/target/release/aether-desktop.exe

      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v3
        with:
          name: aether-desktop-windows-portable
          path: aether-desktop/src-tauri/target/release/aether-desktop.exe
          retention-days: 30

  create-release:
    name: Create Release Assets
    runs-on: ubuntu-latest
    needs: [build-cli, build-desktop, build-desktop-portable]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI Artifact
        uses: actions/download-artifact@v3
        with:
          name: aether-cli-windows-x86_64

      - name: Download Desktop MSI
        uses: actions/download-artifact@v3
        with:
          name: aether-desktop-windows-msi

      - name: Download Desktop NSIS
        uses: actions/download-artifact@v3
        with:
          name: aether-desktop-windows-nsis

      - name: Download Desktop Portable
        uses: actions/download-artifact@v3
        with:
          name: aether-desktop-windows-portable

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aether-cli.exe
            Aether Repair Tool_0.1.0_x64_en-US.msi
            Aether Repair Tool_0.1.0_x64-setup.exe
            aether-desktop.exe
          body_path: .github/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-cli, build-desktop, build-desktop-portable]
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.build-cli.result }}" = "success" ] && \
             [ "${{ needs.build-desktop.result }}" = "success" ] && \
             [ "${{ needs.build-desktop-portable.result }}" = "success" ]; then
            echo "✓ All Windows builds completed successfully"
            exit 0
          else
            echo "✗ Some builds failed"
            exit 1
          fi
