<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'" />
    <title>Aether Repair Tool</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: #00FF41;
        font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        padding: 24px;
      }
      .logo { width: 56px; height: 56px; opacity: 0.9; }
      h1 {
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        font-weight: 600;
        margin: 0;
      }
      p {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        margin: 0;
      }
      .spinner {
        width: 18px; height: 18px;
        border: 2px solid rgba(0,255,65,0.18);
        border-top-color: #00FF41;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      a { color: #00FF41; text-decoration: none; border-bottom: 1px dotted #00FF4180; }
    </style>
  </head>
  <body>
    <!--
      Tauri 2 requires a valid frontendDist with an index.html for `tauri build`.
      The real app is loaded from `app.windows[0].url` in tauri.conf.json — this
      file is only shown if that URL fails (offline, DNS down, server unreachable),
      and acts as a graceful "trying to reach Aether" fallback.
    -->
    <div class="wrap">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Aether Repair Tool</h1>
      <p id="msg">Connecting to console&hellip;</p>
      <p style="opacity:.5">
        If this screen persists, check your network or visit
        <a href="https://mtk-qualcomm-tool.emergent.host" id="link" target="_blank" rel="noreferrer">
          mtk-qualcomm-tool.emergent.host
        </a>
      </p>
    </div>
    <script>
      // Hard fallback: if Tauri didn't load the remote URL within 6s, try to
      // redirect manually so the user isn't stuck on the splash.
      var REMOTE = "https://mtk-qualcomm-tool.emergent.host";
      setTimeout(function () {
        try {
          if (location.href.indexOf("tauri.localhost") === 0 ||
              location.protocol === "tauri:" ||
              location.protocol === "file:") {
            location.replace(REMOTE);
          }
        } catch (_) {}
      }, 6000);
    </script>
  </body>
</html>
